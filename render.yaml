services:
  - type: web
    name: chinese-learning-app
    env: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: APP_NAME
        value: Chinese Learning App
      - key: GOOGLE_SHEET_ID
        value: 1hM0aUWPC2ktLIWHTcqDYWmDzfAhF1hpzOgLVJPsqoAc
      - key: GOOGLE_WORDS_SHEET
        value: từ vựng
      - key: GOOGLE_SENTENCES_SHEET
        value: câu trong game
      - key: GOOGLE_GRAMMAR_SHEET
        value: ngữ pháp
      - key: GOOGLE_LESSONS_SHEET
        value: lessons
      - key: GOOGLE_TOPICS_SHEET
        value: topics
      - key: GOOGLE_RADICALS_SHEET
        value: bộ thủ
      - key: SYNC_ON_STARTUP
        value: "true"
